<!--
  Uygulama Onboarding Modal (Premium kaldirildi)
  Kullaniciya ucretsiz uygulama oldugunu ve reklam izleyerek analiz yapildigini bildirir.
-->
<div id="premium-onboarding-modal" class="fixed inset-0 z-[9999] hidden" style="display:none;">
  <!-- Backdrop -->
  <div class="fixed inset-0 bg-black/80 backdrop-blur-sm"></div>

  <!-- Modal Content -->
  <div class="fixed inset-0 flex items-center justify-center p-4">
    <div
      class="bg-gradient-to-br from-slate-900 to-slate-800 rounded-3xl w-full max-w-md mx-auto shadow-2xl border border-white/10 overflow-y-auto max-h-[90vh]">

      <!-- Header - Cosmic Background -->
      <div class="relative h-48 bg-gradient-to-br from-primary via-purple-600 to-indigo-600 overflow-hidden">
        <div class="absolute inset-0 opacity-30">
          <div class="absolute top-10 left-10 w-32 h-32 bg-white/20 rounded-full blur-3xl animate-pulse"></div>
          <div class="absolute bottom-10 right-10 w-40 h-40 bg-white/10 rounded-full blur-3xl animate-pulse"
            style="animation-delay: 1s"></div>
        </div>

        <div class="relative h-full flex flex-col items-center justify-center text-center px-6">
          <div
            class="w-20 h-20 rounded-full bg-white/20 backdrop-blur-sm flex items-center justify-center mb-4">
            <span class="text-4xl">✨</span>
          </div>
          <h2 class="text-2xl font-display font-bold text-white mb-2">
            ORBIS'e Hoş Geldin!
          </h2>
          <p class="text-sm text-white/80">Kozmik yolculuğuna başla</p>
        </div>
      </div>

      <!-- Body -->
      <div class="p-6 space-y-6">
        <div class="space-y-4">
          <p class="text-sm text-slate-200 text-center leading-relaxed">
            ORBIS <strong>tamamen ücretsiz</strong>! Tüm analiz ve AI yorumlarına erişmek için
            sadece kısa bir <strong>Rewarded reklam</strong> izlemeniz yeterli.
          </p>

          <div class="bg-white/5 rounded-2xl p-4 border border-white/10 space-y-3">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-xl bg-emerald-500/20 flex items-center justify-center">
                <span class="material-icons-round text-emerald-400">check_circle</span>
              </div>
              <div>
                <h3 class="text-white font-bold text-sm">Tamamen Ücretsiz</h3>
                <p class="text-[10px] text-slate-400">Premium üyelik yok, kredi yok</p>
              </div>
            </div>
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-xl bg-amber-500/20 flex items-center justify-center">
                <span class="material-icons-round text-amber-400">play_circle</span>
              </div>
              <div>
                <h3 class="text-white font-bold text-sm">Sınırsız Analiz</h3>
                <p class="text-[10px] text-slate-400">Her analiz için sadece 1 reklam izle</p>
              </div>
            </div>
          </div>

          <!-- Devam Et -->
          <button onclick="closeOnboardingModal()"
            class="w-full bg-gradient-to-r from-primary to-purple-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all text-sm tracking-wide">
            Kozmik Yolculuğa Başla ✨
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // İlk açılış kontrolü (sadece ucretsiz uygulama bilgilendirmesi)
  function checkFirstLaunch() {
    const hasSeenOnboarding = localStorage.getItem( "orbis_seen_onboarding" );
    if ( !hasSeenOnboarding ) {
      setTimeout( () => {
        showOnboardingModal();
      }, 1500 );
    }
  }

  function showOnboardingModal() {
    const modal = document.getElementById( "premium-onboarding-modal" );
    if ( modal ) {
      modal.style.display = "flex";
      modal.classList.remove( "hidden" );
      modal.classList.add( "flex" );
      document.body.style.overflow = "hidden";
    }
  }

  function closeOnboardingModal() {
    const modal = document.getElementById( "premium-onboarding-modal" );
    if ( modal ) {
      modal.style.display = "none";
      modal.classList.add( "hidden" );
      modal.classList.remove( "flex" );
      document.body.style.overflow = "";
      localStorage.setItem( "orbis_seen_onboarding", "true" );
    }
  }

  // Geriye uyumluluk: eski premium fonksiyonlari no-op
  function showPremiumDetails() { /* no-op: premium kaldirildi */ }
  function hidePremiumDetails() { /* no-op: premium kaldirildi */ }
  async function purchasePremium(plan) { /* no-op: premium kaldirildi */ }

  // Sayfa yüklendiğinde kontrol et
  document.addEventListener( "DOMContentLoaded", checkFirstLaunch );
</script>
